# =============================================================================
# docker-compose.yml — Distributed-Backtesting-Engine
#
# Services:
#   backtester  — C++ event-driven backtesting engine (ready to run now)
#   pipeline    — Python: feature engineering → training → model export
#   dashboard   — Streamlit research dashboard (http://localhost:8501)
#
# Quick start (backtester only):
#   1. python scripts/convert_scalers.py        # convert pkl → csv scalers
#   2. mkdir -p output
#   3. docker compose run --rm backtester
#
# Full pipeline + dashboard:
#   docker compose up --build
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # backtester: C++ event-driven backtesting engine
  #
  # Reads from local directories directly — no named volumes needed.
  # ---------------------------------------------------------------------------
  backtester:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.backtester
    image: tradingtransformer-backtester:latest
    volumes:
      # Feature CSV — bind mount to existing backtester/data directory
      - ./backtester/data:/backtester/data:ro
      # Model artefacts (transformer.pt + scaler CSVs) — bind mount
      - ./models:/models:ro
      # Output: ml_equity.csv, ml_trades.csv written here
      - ./output:/output
      # Backtest configuration
      - ./backtest_config.yaml:/app/backtest_config.yaml:ro
    command: ["/app/backtest_config.yaml"]

  # ---------------------------------------------------------------------------
  # pipeline: feature engineering → training → model export
  # Run this to regenerate features or retrain the model.
  # ---------------------------------------------------------------------------
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.python
    image: tradingtransformer-pipeline:latest
    volumes:
      - ./data:/app/data:ro
      - ./backtester/data:/app/features
      - ./models:/app/models
      - ./models:/app/research/models
    environment:
      - CUDA_VISIBLE_DEVICES=""
    command: ["--data-dir", "/app/data", "--feature-dir", "/app/features", "--model-dir", "/app/models"]

  # ---------------------------------------------------------------------------
  # dashboard: Streamlit research dashboard
  # Reads backtest outputs and model artifacts; can write backtest_config.yaml.
  # Access at http://localhost:8501 after `docker compose up`.
  # ---------------------------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.python
    image: tradingtransformer-dashboard:latest
    ports:
      - "8501:8501"
    volumes:
      - ./output:/app/output:ro           # read backtest outputs (equity, trades, metrics)
      - ./models:/app/models:ro           # read model artifacts and sweep results
      - ./backtest_config.yaml:/app/backtest_config.yaml  # read/write config
    depends_on:
      - pipeline
    command:
      - streamlit
      - run
      - research/dashboard/app.py
      - --server.port=8501
      - --server.address=0.0.0.0
      - --server.headless=true

  # ---------------------------------------------------------------------------
  # api: FastAPI bridge for the browser extension (http://localhost:8502)
  #
  # Wraps the backtester so the Chrome extension can call it via REST.
  # Requires models/transformer.pt — run the pipeline service first.
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile.python
    image: tradingtransformer-api:latest
    ports:
      - "8502:8502"
    volumes:
      - ./output:/app/output
      - ./models:/app/models:ro
      - ./backtest_config.yaml:/app/backtest_config.yaml
      - ./data:/app/data:ro
      - ./features:/app/features:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      - pipeline
    command:
      - uvicorn
      - research.api.app:app
      - --host=0.0.0.0
      - --port=8502
      - --workers=1
